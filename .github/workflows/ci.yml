name: CI

on:
  pull_request:
  push:
    branches: [master, main]

# Cancela runs anteriores na mesma branch/PR (poupa minutos em pushes rápidos).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PHP_VERSION: "8.4"
  NODE_VERSION: "22"

jobs:
  lint-php:
    name: Lint PHP (Pint + PHPStan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2
          coverage: none

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Pint (code style)
        run: composer run lint

      - name: PHPStan (static analysis)
        run: composer run analyse

  lint-js:
    name: Lint JS/TS (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install npm dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm run lint

  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install npm dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (resolves workspace subpath imports for typecheck)
        run: pnpm -r --if-present run build

      - name: tsc --noEmit (workspace-wide)
        run: pnpm run typecheck

  test-js:
    name: Tests JS (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install npm dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (resolves workspace subpath imports for tests)
        run: pnpm -r --if-present run build

      - name: Vitest (workspace-wide)
        run: pnpm run test

      - name: Smoke test MCP server stdio handshake
        run: pnpm --filter @arqel-dev/mcp-server smoke

  commitlint:
    name: Commit messages (Conventional Commits)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install npm dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint PR commit range
        run: pnpm exec commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose

  e2e:
    name: Tests E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: sqlite, mbstring, xml, curl
          coverage: none

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Composer deps in apps/demo
        run: composer install --working-dir=apps/demo --no-interaction --prefer-dist

      - name: Install npm deps
        run: pnpm install --frozen-lockfile

      - name: Build all packages (resolves workspace subpath imports)
        run: pnpm -r --if-present run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/demo/package.json', 'pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm --filter @arqel-dev/demo exec playwright install --with-deps chromium

      - name: Setup .env + SQLite + key
        working-directory: apps/demo
        run: |
          cp .env.example .env || true
          php artisan key:generate
          touch database/database.sqlite

      - name: Migrate + seed initial DB (so /admin/login renders before Playwright probes webServer)
        working-directory: apps/demo
        run: |
          php artisan migrate:fresh --seed --force
          php artisan arqel:make-user --email=admin@arqel.test --password=password --name=Admin

      - name: Run E2E tests
        working-directory: apps/demo
        run: pnpm exec playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/demo/playwright-report/
          retention-days: 14
