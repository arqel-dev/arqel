name: CI

on:
  pull_request:
  push:
    branches: [master, main]

# Cancela runs anteriores na mesma branch/PR (poupa minutos em pushes rápidos).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PHP_VERSION: "8.4"
  NODE_VERSION: "22"

jobs:
  lint-php:
    name: Lint PHP (Pint + PHPStan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2
          coverage: none

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Pint (code style)
        run: composer run lint

      - name: PHPStan (static analysis)
        run: composer run analyse

  lint-js:
    name: Lint JS/TS (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install npm dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm run lint

  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install npm dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (resolves workspace subpath imports for typecheck)
        run: pnpm -r --if-present run build

      - name: tsc --noEmit (workspace-wide)
        run: pnpm run typecheck

  test-js:
    name: Tests JS (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install npm dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (resolves workspace subpath imports for tests)
        run: pnpm -r --if-present run build

      - name: Vitest (workspace-wide)
        run: pnpm run test

      - name: Smoke test MCP server stdio handshake
        run: pnpm --filter @arqel-dev/mcp-server smoke

  commitlint:
    name: Commit messages (Conventional Commits)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install npm dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint PR commit range
        run: pnpm exec commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose

  e2e:
    name: Tests E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: sqlite, mbstring, xml, curl
          coverage: none

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Composer deps in apps/demo
        run: composer install --working-dir=apps/demo --no-interaction --prefer-dist

      - name: Install npm deps
        run: pnpm install --frozen-lockfile

      - name: Build all packages (resolves workspace subpath imports)
        run: pnpm -r --if-present run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/demo/package.json', 'pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm --filter @arqel-dev/demo exec playwright install --with-deps chromium

      - name: Setup .env + SQLite + key
        working-directory: apps/demo
        run: |
          cp .env.example .env || true
          php artisan key:generate
          touch database/database.sqlite

      - name: Migrate + seed initial DB (so /admin/login renders before Playwright probes webServer)
        working-directory: apps/demo
        run: |
          php artisan migrate:fresh --seed --force
          php artisan arqel:make-user --email=admin@arqel.test --password=password --name=Admin

      - name: Run E2E tests
        working-directory: apps/demo
        run: pnpm exec playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/demo/playwright-report/
          retention-days: 14

      # --- apps/tenant-demo (multi-tenancy reference app) ---
      # Reuses the Node deps, built packages, and cached Playwright
      # browser from the apps/demo run above.

      - name: Install Composer deps in apps/tenant-demo
        run: composer install --working-dir=apps/tenant-demo --no-interaction --prefer-dist

      - name: Setup tenant-demo .env + SQLite + key
        working-directory: apps/tenant-demo
        run: |
          cp .env.example .env || true
          php artisan key:generate
          touch database/database.sqlite

      - name: Migrate + seed tenant-demo DB
        working-directory: apps/tenant-demo
        run: php artisan migrate:fresh --seed --force

      - name: Smoke-check tenant-demo server boots (surfaces boot errors)
        working-directory: apps/tenant-demo
        run: |
          echo "manifest present: $(ls -la public/build/manifest.json 2>&1)"
          php artisan serve --host=127.0.0.1 --port=8001 > /tmp/tenant-demo-serve.log 2>&1 &
          server_pid=$!
          ok=0
          last_code=000
          for i in $(seq 1 40); do
            last_code=$(curl -s -o /tmp/login-body.html -w '%{http_code}' http://127.0.0.1:8001/admin/login || echo 000)
            echo "attempt $i: HTTP $last_code (serve pid alive: $(kill -0 "$server_pid" 2>/dev/null && echo yes || echo no))"
            if [ "$last_code" = "200" ]; then echo "tenant-demo up (200)"; ok=1; break; fi
            sleep 1
          done
          if [ "$ok" != "1" ]; then
            echo "=== tenant-demo failed (last HTTP $last_code). Server log: ==="
            cat /tmp/tenant-demo-serve.log || true
            echo "=== Response body (first 4KB): ==="
            head -c 4096 /tmp/login-body.html 2>/dev/null || true
            echo ""
            echo "=== Laravel log tail: ==="
            tail -n 40 storage/logs/laravel.log 2>/dev/null || echo "(no laravel.log)"
            kill "$server_pid" 2>/dev/null || true
            exit 1
          fi
          kill "$server_pid" 2>/dev/null || true

      - name: Run E2E tests (apps/tenant-demo)
        working-directory: apps/tenant-demo
        run: pnpm exec playwright test

      - name: Upload Playwright report (tenant-demo) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-tenant-demo
          path: apps/tenant-demo/playwright-report/
          retention-days: 14

      # --- apps/showcase (comprehensive dogfooding app — all 20 packages) ---
      # Two layers of coverage:
      #   1. PHPUnit feature tests on the HOST (SQLite :memory:, APP_ENV=testing
      #      forced by phpunit.xml).
      #   2. E2E against the arqel-dogfood Docker stack (nginx+php-fpm, postgres,
      #      redis, reverb, vite dev-server). Reuses the Node deps, built
      #      packages, and cached Playwright/Chromium from the apps/demo run.

      - name: Install Composer deps in apps/showcase
        run: composer install --working-dir=apps/showcase --no-interaction --prefer-dist

      - name: PHPUnit feature tests (apps/showcase, host SQLite)
        working-directory: apps/showcase
        run: |
          cp .env.example .env || true
          php artisan key:generate
          vendor/bin/phpunit

      - name: Boot the arqel-dogfood stack (pg + redis + reverb + fresh JS build)
        working-directory: apps/showcase
        run: |
          cp .env.dogfood .env
          docker compose -p arqel-dogfood -f compose.dogfood.yml up -d --build
          # Wait for the app to serve a 200. The vite service rebuilds every
          # JS package on startup before serving, so first boot takes a couple
          # of minutes (90 * 3s = up to 4.5 min budget).
          code=000
          for i in $(seq 1 90); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8090/admin/login || echo 000)
            echo "attempt $i: HTTP $code"
            [ "$code" = "200" ] && break
            sleep 3
          done
          test "$code" = "200" || { echo "showcase did not boot"; docker compose -p arqel-dogfood -f compose.dogfood.yml logs --no-color | tail -200; exit 1; }

      - name: Migrate + seed (postgres, inside the container)
        working-directory: apps/showcase
        run: docker compose -p arqel-dogfood -f compose.dogfood.yml exec -T app sh -c "php artisan migrate:fresh --seed --force && php artisan storage:link --force"

      - name: Run E2E tests (apps/showcase, against the dogfood stack)
        working-directory: apps/showcase
        env:
          APP_BASE_URL: http://localhost:8090
        run: pnpm exec playwright test

      - name: Upload Playwright report (showcase) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-showcase
          path: apps/showcase/playwright-report/
          retention-days: 14

      - name: Dogfood stack logs on failure
        if: failure()
        working-directory: apps/showcase
        run: docker compose -p arqel-dogfood -f compose.dogfood.yml logs --no-color | tail -300

      - name: Tear down the dogfood stack
        if: always()
        working-directory: apps/showcase
        run: docker compose -p arqel-dogfood -f compose.dogfood.yml down -v
