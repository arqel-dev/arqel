name: Test Matrix (PHP × Laravel × DB)

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: matrix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight — any PHP packages to test?
    runs-on: ubuntu-latest
    outputs:
      has_php_packages: ${{ steps.detect.outputs.has_php_packages }}
    steps:
      - uses: actions/checkout@v5
      - id: detect
        run: |
          if ls packages/*/src/ 1>/dev/null 2>&1; then
            echo "has_php_packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_php_packages=false" >> "$GITHUB_OUTPUT"
          fi

  test-php:
    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }} · ${{ matrix.db }}
    needs: preflight
    if: needs.preflight.outputs.has_php_packages == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4"]
        laravel: ["12.*", "13.*"]
        db: [mysql, postgres]

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: arqel_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arqel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_CONNECTION: ${{ matrix.db }}
      DB_DATABASE: arqel_test
      DB_HOST: 127.0.0.1
      DB_USERNAME: ${{ matrix.db == 'mysql' && 'root' || 'postgres' }}
      DB_PASSWORD: ${{ matrix.db == 'mysql' && '' || 'postgres' }}
      DB_PORT: ${{ matrix.db == 'mysql' && '3306' || '5432' }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, pdo_mysql, pdo_pgsql, redis, zip, bcmath
          coverage: pcov
          tools: composer:v2

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-php${{ matrix.php }}-laravel${{ matrix.laravel }}-
            ${{ runner.os }}-composer-

      - name: Pin Laravel version for this matrix slot
        env:
          LARAVEL_VERSION: ${{ matrix.laravel }}
        run: |
          composer require "laravel/framework:$LARAVEL_VERSION" --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Run Pest (with coverage)
        run: |
          if ls packages/*/vendor/bin/pest 1>/dev/null 2>&1; then
            for pkg in packages/*/; do
              if [ -f "${pkg}vendor/bin/pest" ]; then
                echo "::group::Pest for ${pkg}"
                (cd "$pkg" && vendor/bin/pest --coverage --min=85)
                echo "::endgroup::"
              fi
            done
          else
            echo "No Pest binaries in packages/*/vendor/bin — falling back to composer test."
            composer run test
          fi

      - name: Upload coverage to Codecov
        if: matrix.php == '8.4' && matrix.laravel == '13.*' && matrix.db == 'mysql'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # Job sentinela para que status checks possam referir-se a "Matrix OK" e não
  # a um job matricial específico (o matrix só existe se has_php_packages=true).
  matrix-ok:
    name: Matrix OK
    needs: [preflight, test-php]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summarize
        env:
          PREFLIGHT: ${{ needs.preflight.result }}
          TEST_PHP: ${{ needs.test-php.result }}
          HAS_PKG: ${{ needs.preflight.outputs.has_php_packages }}
        run: |
          if [ "$PREFLIGHT" != "success" ]; then
            echo "Preflight failed." && exit 1
          fi
          if [ "$HAS_PKG" = "false" ]; then
            echo "No PHP packages yet — matrix intentionally skipped." && exit 0
          fi
          if [ "$TEST_PHP" != "success" ]; then
            echo "test-php matrix failed." && exit 1
          fi
          echo "Matrix succeeded."
