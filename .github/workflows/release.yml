name: Release

# Disparado por tag semver (ex: v0.8.0). Faz split de cada pacote PHP em
# packages/* para o sub-repo arqel-dev/<pkg> via splitsh/lite (Packagist
# puxa via webhook), e publica os pacotes npm em packages-js/* via
# pnpm publish -r --access public.
#
# PrĂ©-requisitos (ver docs/publishing-setup.md):
# - Org github.com/arqel-dev existe
# - Secrets: ARQEL_BOT_TOKEN (PAT com repo+admin:org), NPM_TOKEN (publish, automation)
# - Conta Packagist arqel-dev com webhook do GitHub configurado por sub-repo

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (nĂŁo publica)"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      tag:
        description: "Tag manual a publicar (ex: v0.8.0). Default = HEAD"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GH_ORG: arqel-dev

jobs:
  resolve:
    name: Resolve tag and release params
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.params.outputs.tag }}
      version: ${{ steps.params.outputs.version }}
      dry_run: ${{ steps.params.outputs.dry_run }}
    steps:
      - id: params
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            tag="$REF_NAME"
            dry="false"
          else
            tag="${INPUT_TAG:-$REF_NAME}"
            dry="${INPUT_DRY_RUN:-true}"
          fi
          version="${tag#v}"
          {
            echo "tag=$tag"
            echo "version=$version"
            echo "dry_run=$dry"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=$tag version=$version dry_run=$dry"

  split-php:
    name: Split PHP â€” ${{ matrix.name }}
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: actions, path: packages/actions }
          - { name: ai, path: packages/ai }
          - { name: audit, path: packages/audit }
          - { name: auth, path: packages/auth }
          - { name: cli, path: packages/cli }
          - { name: core, path: packages/core }
          - { name: export, path: packages/export }
          - { name: fields, path: packages/fields }
          - { name: fields-advanced, path: packages/fields-advanced }
          - { name: form, path: packages/form }
          - { name: marketplace, path: packages/marketplace }
          - { name: mcp, path: packages/mcp }
          - { name: nav, path: packages/nav }
          - { name: realtime, path: packages/realtime }
          - { name: table, path: packages/table }
          - { name: tenant, path: packages/tenant }
          - { name: versioning, path: packages/versioning }
          - { name: widgets, path: packages/widgets }
          - { name: workflow, path: packages/workflow }
          - { name: framework, path: packages/arqel }
    steps:
      - name: Checkout monorepo (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.ARQEL_BOT_TOKEN }}

      - name: Install splitsh/lite
        run: |
          # v2.0.0 ships no binaries â€” last release with prebuilt binaries is v1.0.1.
          # --no-same-owner / --no-same-permissions avoid tar trying to chmod /tmp.
          mkdir -p /tmp/splitsh
          curl -fsSL "https://github.com/splitsh/lite/releases/download/v1.0.1/lite_linux_amd64.tar.gz" \
            | tar -xz --no-same-owner --no-same-permissions -C /tmp/splitsh
          sudo install -m 755 /tmp/splitsh/splitsh-lite /usr/local/bin/splitsh-lite
          splitsh-lite --version || true

      - name: Ensure sub-repo exists (auto-create if missing)
        env:
          GH_TOKEN: ${{ secrets.ARQEL_BOT_TOKEN }}
          PKG_NAME: ${{ matrix.name }}
        run: |
          if ! gh repo view "$GH_ORG/$PKG_NAME" >/dev/null 2>&1; then
            echo "Creating $GH_ORG/$PKG_NAME"
            gh repo create "$GH_ORG/$PKG_NAME" \
              --public \
              --description "Subtree split of arqel-dev/$PKG_NAME (read-only â€” open issues/PRs in arqel-dev/arqel)" \
              --homepage "https://arqel.dev"
          else
            echo "Repo $GH_ORG/$PKG_NAME already exists"
          fi

      - name: Compute split SHA
        id: split
        env:
          PKG_NAME: ${{ matrix.name }}
          PKG_PATH: ${{ matrix.path }}
        run: |
          sha="$(splitsh-lite --prefix="$PKG_PATH" --quiet)"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Split SHA for $PKG_PATH â†’ $sha"

      - name: Push split to sub-repo
        if: needs.resolve.outputs.dry_run != 'true'
        env:
          PKG_NAME: ${{ matrix.name }}
          SHA: ${{ steps.split.outputs.sha }}
          TAG: ${{ needs.resolve.outputs.tag }}
          GH_TOKEN: ${{ secrets.ARQEL_BOT_TOKEN }}
        run: |
          remote="https://x-access-token:$GH_TOKEN@github.com/$GH_ORG/$PKG_NAME.git"
          git push "$remote" "$SHA:refs/heads/main" --force
          git push "$remote" "$SHA:refs/tags/$TAG" --force

      - name: Dry-run summary
        if: needs.resolve.outputs.dry_run == 'true'
        env:
          PKG_NAME: ${{ matrix.name }}
          SHA: ${{ steps.split.outputs.sha }}
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          echo "DRY RUN: would push $SHA -> $GH_ORG/$PKG_NAME main + tag $TAG"

  publish-npm:
    name: Publish npm packages
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.9.0
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package versions match release tag
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          mismatched=0
          for f in packages-js/*/package.json; do
            pkg_version=$(node -p "require('./$f').version")
            pkg_private=$(node -p "require('./$f').private || false")
            if [ "$pkg_private" = "true" ]; then
              echo "skip $f (private)"
              continue
            fi
            if [ "$pkg_version" != "$VERSION" ]; then
              echo "::error file=$f::version $pkg_version != tag $VERSION"
              mismatched=$((mismatched+1))
            fi
          done
          if [ "$mismatched" -gt 0 ]; then
            echo "$mismatched npm packages have a version mismatch with tag v$VERSION"
            exit 1
          fi

      - name: Build all publishable packages
        env:
          # @arqel-dev/ui has 14 entry points + DTS â€” default heap (~2GB)
          # OOMs the tsup DTS worker on standard runners.
          NODE_OPTIONS: --max-old-space-size=6144
        run: pnpm -r --filter "./packages-js/*" --if-present run build

      - name: Publish (dry run)
        if: needs.resolve.outputs.dry_run == 'true'
        run: pnpm publish -r --access public --no-git-checks --dry-run

      - name: Publish to npm
        if: needs.resolve.outputs.dry_run != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish -r --access public --no-git-checks

  github-release:
    name: Create GitHub release
    needs: [resolve, split-php, publish-npm]
    if: needs.resolve.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Extract changelog section
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          echo "Notes:"
          cat release-notes.md
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            --verify-tag
