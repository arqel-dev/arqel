version: 2

# Coexistência com Renovate (ver renovate.json):
# - Composer e npm são geridos pelo Renovate (melhor grouping, schedule, auto-merge).
# - Dependabot só fica com GitHub Actions (para simplicidade) e Security Updates
#   (automaticamente tratados pela GitHub Security, independente deste ficheiro).
# - Se o Renovate Bot for desinstalado, reactivar as entradas composer/npm aqui.

updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: Europe/Lisbon
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: scope
    groups:
      github-actions:
        patterns: ["*"]
