# apps/showcase/compose.dogfood.yml
# Isolated dogfood stack. ALWAYS run with: docker compose -p arqel-dogfood -f compose.dogfood.yml ...
name: arqel-dogfood
services:
  app:
    build: { context: ., dockerfile: docker/Dockerfile }
    container_name: arqel-dogfood-app
    ports: ["8090:80"]
    env_file: [.env.dogfood]
    # The showcase composer.json uses path repositories symlinked into vendor/
    # (vendor/arqel-dev/* -> ../../../../packages/*, resolving to /var/packages/*
    # inside the container). Mount the monorepo packages/ there so those symlinks
    # resolve and the autoloader can find the arqel-dev/* sources.
    volumes: [".:/var/www/html", "../../packages:/var/packages"]
    depends_on: [db, redis]
    networks: [arqel-dogfood-net]
  vite:
    image: node:22-alpine
    container_name: arqel-dogfood-vite
    working_dir: /app
    # CI=true so pnpm can non-interactively reconcile the host-mounted node_modules
    # (avoids ERR_PNPM_ABORTED_REMOVE_MODULES_DIR_NO_TTY when the store layout differs).
    # LARAVEL_BYPASS_ENV_CHECK=1 lets the laravel-vite-plugin run the HMR dev server
    # despite CI=true (it otherwise refuses to start in CI environments).
    environment: { CI: "true", LARAVEL_BYPASS_ENV_CHECK: "1" }
    # Stale-dist trap: the vite dev-server resolves @arqel-dev/* from each
    # package's built dist/, NOT its src/. If the dist is stale (older than src),
    # the dogfood E2E silently tests OLD code. So we MUST rebuild every workspace
    # JS package (tsup -> fresh dist/, host-mounted) before vite serves. This adds
    # ~1-2 min to startup but guarantees the dogfood suite exercises fresh source.
    # Scoped to packages-js/* (matches pnpm-workspace.yaml) so we don't rebuild the
    # showcase app itself here — vite serves it from src.
    command: sh -c "corepack enable && pnpm install --frozen-lockfile=false --config.confirm-modules-purge=false && pnpm -r --filter './packages-js/*' build && pnpm --filter @arqel-dev/showcase exec vite --host 0.0.0.0 --port 5180"
    ports: ["5180:5180"]
    # Mount the repo for HMR + to write fresh package dist/ back to the host,
    # BUT keep the container's node_modules in isolated anonymous volumes so the
    # container's `pnpm install` (root, different store layout) never rewrites the
    # host/runner node_modules. Without this, the install strips the runner's
    # .bin shims and the CI E2E step fails with "Command playwright not found".
    # The workspace node_modules (apps/*, packages-js/*) symlink into the root
    # .pnpm store, so isolating the root node_modules is what protects them.
    volumes:
      - "../../:/app"
      - "/app/node_modules"
      - "/app/apps/showcase/node_modules"
    networks: [arqel-dogfood-net]
  db:
    image: postgres:18-alpine
    container_name: arqel-dogfood-db
    ports: ["5433:5432"]
    environment:
      POSTGRES_DB: arqel_dogfood
      POSTGRES_USER: arqel
      POSTGRES_PASSWORD: arqel
    # postgres:18+ stores data under a version subdir and expects the volume at
    # /var/lib/postgresql (NOT the legacy /var/lib/postgresql/data). Mounting the
    # old path makes pg 18 abort on a fresh volume ("PostgreSQL data in
    # /var/lib/postgresql/data (unused mount/volume)") — which is why the DB never
    # became reachable on a clean CI runner. Use the 18+ mount point.
    volumes: ["arqel-dogfood-db-data:/var/lib/postgresql"]
    networks: [arqel-dogfood-net]
  redis:
    image: redis:7-alpine
    container_name: arqel-dogfood-redis
    ports: ["6390:6379"]
    volumes: ["arqel-dogfood-redis-data:/data"]
    networks: [arqel-dogfood-net]
  reverb:
    build: { context: ., dockerfile: docker/Dockerfile }
    container_name: arqel-dogfood-reverb
    # Override the image ENTRYPOINT (php-fpm + nginx) so this container runs the
    # Reverb WebSocket server instead of the web stack.
    entrypoint: []
    command: sh -c "php artisan reverb:start --host=0.0.0.0 --port=8080"
    ports: ["8091:8080"]
    env_file: [.env.dogfood]
    volumes: [".:/var/www/html", "../../packages:/var/packages"]
    depends_on: [app]
    networks: [arqel-dogfood-net]
networks:
  arqel-dogfood-net: { driver: bridge }
volumes:
  arqel-dogfood-db-data: {}
  arqel-dogfood-redis-data: {}
